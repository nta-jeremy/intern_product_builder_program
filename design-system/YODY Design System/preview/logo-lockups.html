<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  body { background: var(--bg); padding: 28px; margin: 0; font-family: var(--font-body); }
  .frame { display: flex; flex-direction: column; gap: 22px; max-width: 720px; }
  .row { display: flex; align-items: center; gap: 22px; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg); box-shadow: var(--shadow-sm); }
  .row.dark { background: var(--bg-ink); border-color: transparent; }
  .row.dark .name, .row.dark .name .sub { color: #fff; }
  .row.dark .caption { color: rgba(255,255,255,0.55); }

  .real { width: 140px; height: 120px; background: url('../assets/yody-logo.png') center/contain no-repeat; flex-shrink: 0; }

  .stack { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
  .lockup { display: flex; align-items: center; gap: 10px; }
  /* Wordmark — Quicksand 700 native proportions: tall round counters match
     real YODY mark. Slight scaleX widens for squarer feel without flattening. */
  .mark {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-light) 60%, var(--accent) 100%);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font: 700 24px/1 'Quicksand', system-ui, sans-serif;
    letter-spacing: -0.02em;
    box-shadow: 0 3px 10px rgba(124,108,245,0.3);
  }
  .mark > span { display: inline-block; transform: scaleX(1.04); }

  .name {
    font: 700 26px/1 'Quicksand', system-ui, sans-serif;
    letter-spacing: -0.015em; color: var(--fg-1);
    display: flex; align-items: baseline; gap: 8px;
  }
  .name .word { display: inline-block; transform: scaleX(1.04); transform-origin: 0 50%; }
  .name .sub {
    font-family: var(--font-brand);
    font-weight: 500; font-size: 14px; letter-spacing: 0.02em;
    background: linear-gradient(90deg, var(--brand), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    transform: none;
  }
  .name.lg { font-size: 40px; }
  .name.lg .sub { font-size: 18px; }

  .caption { font: 500 11px/1.4 var(--font-mono); color: var(--fg-3); letter-spacing: 0.04em; }
  .caption b { color: var(--fg-2); font-weight: 600; }
</style></head><body>
  <div class="frame">

    <div class="row">
      <div class="real"></div>
      <div class="stack">
        <div class="lockup"><div class="mark"><span>y</span></div><div class="name"><span class="word">yody</span><span class="sub">·id</span></div></div>
        <span class="caption"><b>Header lockup · 26px</b> · Quicksand 700 native · scaleX(1.04) cho counters rộng tròn match wordmark</span>
      </div>
    </div>

    <div class="row">
      <div class="stack">
        <div class="lockup"><div class="mark" style="width: 52px; height: 52px; font-size: 36px; border-radius: 12px;"><span>y</span></div><div class="name lg"><span class="word">yody</span><span class="sub">·id</span></div></div>
        <span class="caption"><b>Hero lockup · 40px</b> · Quicksand 700 native · scaleX(1.04) · ".id" giữ Be Vietnam Pro làm contrast</span>
      </div>
    </div>

    <div class="row dark">
      <div class="stack">
        <div class="lockup">
          <div class="mark" style="background: var(--brand-gold); color: var(--brand);"><span>y</span></div>
          <div class="name"><span class="word">yody</span><span class="sub" style="color: var(--brand-gold); -webkit-background-clip: initial; background-clip: initial; background: none;">·id</span></div>
        </div>
        <span class="caption"><b>Dark surface · gold mark</b> · brand DNA anchor cho hero / footer dark</span>
      </div>
    </div>

  </div>
</body></html>
