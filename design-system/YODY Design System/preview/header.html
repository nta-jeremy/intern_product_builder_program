<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  body { background: var(--bg-2); padding: 32px; margin: 0; font-family: var(--font-body); }
  .frame { max-width: 1200px; }
  .header {
    background: rgba(252,252,255,0.92);
    backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border); border-radius: var(--radius); height: 64px;
    display: flex; align-items: center; padding: 0 24px; gap: 20px;
    box-shadow: var(--shadow-sm);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-light) 60%, var(--iris) 100%);
    color: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(124,108,245,0.28);
    font: 700 22px/1 'Quicksand', system-ui, sans-serif; letter-spacing: -0.02em;
  }
  .logo-mark > span { display: inline-block; transform: scaleX(1.04); }
  .logo-name {
    font: 700 22px/1 'Quicksand', system-ui, sans-serif; letter-spacing: -0.015em; color: var(--fg-1);
    display: flex; align-items: baseline; gap: 8px;
  }
  .logo-name .word { display: inline-block; transform: scaleX(1.04); transform-origin: 0 50%; }
  .logo-name .sub {
    font-family: var(--font-brand); font-weight: 500; font-size: 14px; letter-spacing: 0.02em;
    background: linear-gradient(90deg, var(--brand), var(--iris));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sep { width: 1px; height: 24px; background: var(--border); }
  nav { display: flex; gap: 4px; flex: 1; }
  nav a {
    font: 600 12px/1 var(--font-mono); color: var(--fg-2);
    text-transform: uppercase; letter-spacing: 0.18em;
    padding: 10px 16px; border-radius: 9999px; cursor: pointer;
    transition: all 0.15s var(--ease-out);
  }
  nav a:hover { background: var(--bg-muted); color: var(--fg-1); }
  nav a.active { background: var(--brand); color: #fff; }
  .right { display: flex; align-items: center; gap: 14px; }
  .tag {
    font: 700 10px/1 var(--font-mono); text-transform: uppercase; letter-spacing: 0.22em;
    padding: 6px 12px; background: var(--iris-tint); color: var(--iris-deep);
    border: 1px solid rgba(124,108,245,.22); border-radius: 9999px;
  }
  .updated {
    font: 600 11px/1 var(--font-mono); color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.22em;
  }
  .caption { margin-top: 16px; font: 400 14px/1.5 var(--font-body); color: var(--fg-3); }
  .caption strong { color: var(--fg-2); font-weight: 600; }
</style></head><body>
  <div class="frame">
    <div class="header">
      <div class="logo">
        <div class="logo-mark"><span>y</span></div>
        <div class="logo-name"><span class="word">yody</span><span class="sub">·id</span></div>
      </div>
      <div class="sep"></div>
      <nav>
        <a>00 · System</a>
        <a class="active">01 · Vision</a>
        <a>02 · Platforms</a>
        <a>03 · Capabilities</a>
      </nav>
      <div class="right">
        <span class="tag">TOGAF Governance</span>
        <span class="updated">v2026.05</span>
      </div>
    </div>
    <p class="caption">
      Sticky <strong>64px</strong> · frosted blur 20px · Quicksand wordmark (logo) · mono nav 0.18em uppercase ·
      active = solid brand pill · iris-tinted TOGAF tag · meta version stamp.
    </p>
  </div>
</body></html>
