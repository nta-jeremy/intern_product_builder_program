<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { background: var(--bg); padding: 40px 48px; margin: 0; }
  .head {
    font: 700 13px/1 var(--font-mono); text-transform: uppercase;
    letter-spacing: 0.32em; color: var(--brand); margin-bottom: 8px;
    display: inline-flex; align-items: center; gap: 14px;
  }
  .head::before { content: ''; width: 32px; height: 1px; background: var(--brand); opacity: 0.5; }
  .lede { font: 400 18px/1.6 var(--font-body); color: var(--fg-2); max-width: 760px; margin-bottom: 32px; }

  .row { display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .box {
    width: 110px; height: 110px;
    background: linear-gradient(135deg, var(--bg) 0%, var(--iris-tint) 100%);
    border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  }
  .box .name { font: 700 16px/1 var(--font-impact); color: var(--fg-1); letter-spacing: -0.005em; }
  .box .v { font: 500 11px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.12em; text-transform: uppercase; }
</style></head><body>
  <span class="head">Corner radii</span>
  <p class="lede">Scale từ micro tag (4) tới hero card (16) và full pill (9999). 12px là default cho card; 8px cho button.</p>

  <div class="row">
    <div class="box" style="border-radius: 4px;"><span class="name">4</span><span class="v">xs · tag</span></div>
    <div class="box" style="border-radius: 8px;"><span class="name">8</span><span class="v">sm · button</span></div>
    <div class="box" style="border-radius: 12px;"><span class="name">12</span><span class="v">md · default</span></div>
    <div class="box" style="border-radius: 14px;"><span class="name">14</span><span class="v">lg · card</span></div>
    <div class="box" style="border-radius: 16px;"><span class="name">16</span><span class="v">xl · hero</span></div>
    <div class="box" style="border-radius: 24px;"><span class="name">24</span><span class="v">2xl · feature</span></div>
    <div class="box" style="border-radius: 9999px;"><span class="name">∞</span><span class="v">pill</span></div>
  </div>
</body></html>
